name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: ./global.json
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish Windows x64
      run: dotnet publish src/SSHHelper.App/SSHHelper.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish/win-x64
      
    - name: Publish Windows x86
      run: dotnet publish src/SSHHelper.App/SSHHelper.App.csproj -c Release -r win-x86 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish/win-x86
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SSHHelper-Windows
        path: ./publish/
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./publish/win-x64/SSHHelper.exe
          ./publish/win-x86/SSHHelper.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}